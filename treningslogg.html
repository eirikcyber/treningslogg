<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treningslogg">
<meta name="theme-color" content="#0a0a0f">
<title>Treningslogg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #c8f060;
    --accent2: #60b4f0;
    --accent3: #f060a0;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --success: #60f0a0;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* в”Җв”Җ LAYOUT в”Җв”Җ */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header {
    padding: env(safe-area-inset-top, 12px) 20px 0;
    padding-top: max(env(safe-area-inset-top), 12px);
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 8px; border-bottom: 1px solid var(--border); }
  .app-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .app-title span { color: var(--accent); }
  .week-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); background: var(--card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }

  #content { flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: max(env(safe-area-inset-bottom), 80px); }

  /* в”Җв”Җ NAV в”Җв”Җ */
  #nav {
    display: flex; gap: 4px; padding: 10px 20px;
    padding-bottom: max(env(safe-area-inset-bottom, 10px), 10px);
    background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 4px; border: none; background: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 10px; cursor: pointer;
    border-radius: 10px; transition: all 0.2s;
  }
  .nav-btn.active { color: var(--accent); background: rgba(200,240,96,0.08); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* в”Җв”Җ VIEWS в”Җв”Җ */
  .view { display: none; }
  .view.active { display: block; }

  /* в”Җв”Җ CARDS в”Җв”Җ */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
  .card-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }

  /* в”Җв”Җ TODAY VIEW в”Җв”Җ */
  .day-selector { display: flex; gap: 8px; margin-bottom: 16px; }
  .day-btn {
    flex: 1; padding: 10px 4px; border: 1px solid var(--border); background: var(--card);
    color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .day-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.08); }

  .exercise-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .exercise-row:last-child { border-bottom: none; }
  .ex-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 18px; flex-shrink: 0; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .ex-target { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent2); }
  .ex-done { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
  .ex-done.checked { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  /* в”Җв”Җ LOG FORM в”Җв”Җ */
  .log-form { margin-top: 8px; }
  .set-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .set-row { display: flex; gap: 8px; align-items: center; }
  .set-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 38px; flex-shrink: 0; }
  .set-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
    padding: 10px 12px; outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .set-input:focus { border-color: var(--accent); }
  .kg-reps-row { display: flex; gap: 6px; align-items: center; flex: 1; }
  .kg-reps-row .set-input { text-align: center; }
  .kg-reps-sep { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .input-unit { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .set-input::placeholder { color: var(--muted); }
  .note-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 10px 12px; outline: none; resize: none; height: 64px;
    transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--accent2); }
  .save-btn {
    width: 100%; padding: 14px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px;
    transition: all 0.15s; letter-spacing: 0.3px;
  }
  .save-btn:active { transform: scale(0.97); opacity: 0.9; }

  /* в”Җв”Җ PROGRAM VIEW в”Җв”Җ */
  .prog-day { margin-bottom: 16px; }
  .prog-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: var(--r) var(--r) 0 0;
    background: linear-gradient(135deg, var(--accent2) 0%, #3060c0 100%);
  }
  .prog-day:nth-child(2) .prog-header { background: linear-gradient(135deg, var(--accent3) 0%, #8020a0 100%); }
  .prog-day:nth-child(3) .prog-header { background: linear-gradient(135deg, var(--accent) 0%, #60a020 100%); color: var(--bg); }
  .prog-day-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
  .prog-body { background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r) var(--r); }
  .prog-ex { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .prog-ex:last-child { border-bottom: none; }
  .prog-ex-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .prog-ex-detail { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .tag.sets { color: var(--accent); border-color: rgba(200,240,96,0.3); }
  .tag.note { color: var(--accent2); border-color: rgba(96,180,240,0.3); }

  /* в”Җв”Җ HISTORY VIEW в”Җв”Җ */
  .hist-entry { margin-bottom: 12px; }
  .hist-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .hist-date::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .hist-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
  .hist-day-tag { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .hist-ex-line { font-size: 13px; color: var(--text); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .hist-ex-sets { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.5; }

  /* в”Җв”Җ PROGRESS VIEW в”Җв”Җ */
  .prog-stat { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--accent); }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }

  .pr-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .pr-row:last-child { border-bottom: none; }
  .pr-name { font-size: 14px; }
  .pr-val { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); font-weight: 500; }

  /* в”Җв”Җ MISC в”Җв”Җ */
  .section-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .chip { display: inline-flex; align-items: center; gap: 4px; font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 20px; background: rgba(200,240,96,0.1); color: var(--accent); border: 1px solid rgba(200,240,96,0.25); margin-bottom: 16px; }

  select.set-input { appearance: none; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); padding: 20px; padding-bottom: max(env(safe-area-inset-bottom), 20px); width: 100%; max-height: 85dvh; overflow-y: auto; transform: translateY(40px); transition: transform 0.25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .modal-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  .field-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-inner">
      <div class="app-title">Trenings<span>logg</span></div>
      <div class="week-badge" id="weekBadge">Veke 1</div>
    </div>
  </div>

  <div id="content">
    <!-- TODAY VIEW -->
    <div class="view active" id="view-today">
      <div class="chip">рҹ“… I dag</div>
      <div class="day-selector">
        <button class="day-btn active" onclick="selectDay('A',this)">DAG A</button>
        <button class="day-btn" onclick="selectDay('B',this)">DAG B</button>
        <button class="day-btn" onclick="selectDay('C',this)">DAG C</button>
        <button class="day-btn" onclick="selectDay('K',this)" style="color:var(--accent2);border-color:var(--accent2)">рҹҸғ</button>
      </div>
      <div class="card" id="dayCard">
        <div class="card-label" id="dayLabel">Tung nedre + skulderpress</div>
        <div id="exerciseList"></div>
      </div>
      <button class="save-btn" onclick="openLogModal()" id="logBtn">+ Logg denne Гёkta</button>
    </div>

    <!-- PROGRAM VIEW -->
    <div class="view" id="view-program">
      <div class="chip">рҹ“Ӣ Program</div>
      <div id="programContent"></div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view" id="view-history">
      <div class="chip">рҹ“– Historikk</div>
      <div id="historyContent"></div>
    </div>

    <!-- PROGRESS VIEW -->
    <div class="view" id="view-progress">
      <div class="chip">рҹ“Ҳ Framgang</div>
      <div class="prog-stat">
        <div class="stat-card"><div class="stat-val" id="statSessions">0</div><div class="stat-label">Гҳkter logga</div></div>
        <div class="stat-card"><div class="stat-val" id="statWeek">1</div><div class="stat-label">Veke</div></div>
      </div>
      <div class="card">
        <div class="card-label">Personlege rekordar</div>
        <div id="prList"></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-label">Chin-up plan вҖ“ framgang</div>
        <div id="chinupPlan"></div>
      </div>
      <div style="margin-top:16px">
        <button class="save-btn" onclick="copyLog()" id="copyBtn" style="background:var(--accent2)">рҹ“Ӣ Kopier logg til utklippstavle</button>
        <div id="copyFeedback" style="margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;display:none">вң“ Kopiert! Lim inn i chatten.</div>
        <button class="save-btn" onclick="exportJSON()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);margin-top:8px">рҹ’ҫ Eksporter logg som JSON (backup)</button>
        <button class="save-btn" onclick="document.getElementById('importFile').click()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);margin-top:8px">рҹ“Ӯ Importer logg frГҘ JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
        <div id="importFeedback" style="margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--success);text-align:center;display:none"></div>
      </div>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" onclick="showView('today',this)"><span class="nav-icon">рҹҸӢпёҸ</span>I dag</button>
    <button class="nav-btn" onclick="showView('program',this)"><span class="nav-icon">рҹ“Ӣ</span>Program</button>
    <button class="nav-btn" onclick="showView('history',this)"><span class="nav-icon">рҹ“–</span>Historikk</button>
    <button class="nav-btn" onclick="showView('progress',this)"><span class="nav-icon">рҹ“Ҳ</span>Framgang</button>
  </nav>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="logModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Logg Гёkt</div>
    <div class="modal-sub" id="modalSub"></div>
    <div id="modalBody"></div>
    <button class="save-btn" onclick="saveSession()">Lagre Гёkt вң“</button>
  </div>
</div>

<script>
// в”Җв”Җ DATA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const PROGRAM = {
  A: {
    label: 'Tung nedre + skulderpress',
    exercises: [
      { name: 'Squat', target: '4 Г— 5', pause: '3 min', note: 'Tung | +2,5 kg/veke', sets: 4, hasKg: true, startKg: 65 },
      { name: 'Deadlift', target: '3 Г— 6', pause: '90 sek', note: 'Lett (80% av squat)', sets: 3, hasKg: true, startKg: 52.5 },
      { name: 'Skulderpress, sittande', target: '4 Г— 10вҖ“12', pause: '90 sek', note: 'Bytt til 15 kg ved 4Г—12', sets: 4, hasKg: true, startKg: 12.5 },
      { name: 'Planke', target: '3 Г— maks-2', pause: '60 sek', note: 'Start ~40 sek | ikkje til failure', sets: 3, hasKg: false, isTimed: true },
    ]
  },
  B: {
    label: 'Tung Гёvre + chin-ups',
    exercises: [
      { name: 'Benkpress', target: '4 Г— 5', pause: '3 min', note: 'Tung | +2,5 kg/veke', sets: 4, hasKg: true, startKg: 60 },
      { name: 'Chin-ups', target: '4 Г— maks-2 + 2 neg.', pause: '2 min', note: '3вҖ“5 sek ned pГҘ negatives', sets: 4, hasKg: false },
      { name: 'Horisontal rad', target: '3 Г— 10вҖ“12', pause: '90 sek', note: 'Under stang i cage', sets: 3, hasKg: false },
      { name: 'Biceps curl (curl-stang)', target: '3 Г— 10вҖ“12', pause: '60 sek', note: 'Progressivt', sets: 3, hasKg: true, startKg: null },
    ]
  },
  C: {
    label: 'Tung deadlift + squat lett + volum',
    exercises: [
      { name: 'Deadlift', target: '4 Г— 4вҖ“5', pause: '3 min', note: 'Tung | +2,5 kg/veke', sets: 4, hasKg: true, startKg: 65 },
      { name: 'Squat', target: '3 Г— 8', pause: '90 sek', note: 'Lett (80% av deadlift)', sets: 3, hasKg: true, startKg: 52.5 },
      { name: 'Benkpress', target: '3 Г— 8вҖ“10', pause: '90 sek', note: 'Lettare enn Dag B', sets: 3, hasKg: true, startKg: 50 },
      { name: 'Chin-ups', target: '3 Г— maks-2', pause: '90 sek', note: 'Ikkje til failure', sets: 3, hasKg: false },
    ]
  }
};

const CHINUP_PLAN = [
  { veke: 1, dagB: '4 Г— 3', dagC: '3 Г— 3', neg: '2 neg./sett' },
  { veke: 2, dagB: '4 Г— 3', dagC: '3 Г— 3', neg: '2 neg./sett' },
  { veke: 3, dagB: '4 Г— 4', dagC: '3 Г— 3', neg: '2 neg. sett 1вҖ“2' },
  { veke: 4, dagB: '4 Г— 4', dagC: '3 Г— 4', neg: '2 neg. sett 1' },
  { veke: 5, dagB: '4 Г— 4вҖ“5', dagC: '3 Г— 4', neg: '1 neg. sett 1' },
  { veke: 6, dagB: '4 Г— 5', dagC: '3 Г— 4вҖ“5', neg: '1 neg. sett 1' },
  { veke: 7, dagB: '4 Г— 5', dagC: '3 Г— 5', neg: 'Valfritt' },
  { veke: 8, dagB: '4 Г— 5вҖ“6', dagC: '3 Г— 5', neg: 'Valfritt' },
  { veke: 9, dagB: '4 Г— 6', dagC: '3 Г— 5вҖ“6', neg: 'Ingen' },
  { veke: 10, dagB: '4 Г— 6', dagC: '3 Г— 6', neg: 'Ingen' },
  { veke: 11, dagB: '4 Г— 6вҖ“7', dagC: '3 Г— 6', neg: 'Ingen вҖ“ vurder vest' },
  { veke: 12, dagB: '3 Г— 4', dagC: '2 Г— 4', neg: 'DELOAD' },
];

// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let currentDay = 'A';
let checkedExercises = {};
let sessions = JSON.parse(localStorage.getItem('treningslogg_sessions') || '[]');

function save() { localStorage.setItem('treningslogg_sessions', JSON.stringify(sessions)); }

// в”Җв”Җ NAV в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'history') renderHistory();
  if (id === 'progress') renderProgress();
  if (id === 'program') renderProgramView();
}

// Finn siste loggfГёrte kg for ei Гёving (sГёk bakover i tid)
function getLastKg(exName) {
  for (const s of sessions) {
    for (const ex of s.exercises) {
      if (ex.name === exName && ex.hasKg && ex.sets.length > 0) {
        const kg = parseFloat(ex.sets[0].kg);
        if (!isNaN(kg)) return kg;
      }
    }
  }
  return null;
}

// Progresjonsreglar per Гёving
// increment: kor mykje ГҘ leggje pГҘ
// linkedTo: hent vekt frГҘ ei anna Гёving og gang med factor
const PROGRESSION = {
  // Dag A
  'Squat_A':                    { increment: 2.5 },
  'Deadlift_A':                 { linkedTo: 'Squat_A', factor: 0.8 },
  'Skulderpress, sittande_A':   { increment: 0 },

  // Dag B
  'Benkpress_B':                { increment: 2.5 },
  'Biceps curl (curl-stang)_B': { increment: 0 },

  // Dag C
  'Deadlift_C':                 { increment: 2.5 },
  'Squat_C':                    { linkedTo: 'Deadlift_C', factor: 0.8 },
  'Benkpress_C':                { linkedTo: 'Benkpress_B', factor: 1.0 },
};

function round(kg) {
  // Rund til nГҰrmaste 0.5 kg (mikrovekter)
  return Math.round(kg * 2) / 2;
}

function getSuggestedKg(ex, day) {
  const key = `${ex.name}_${day}`;
  const rule = PROGRESSION[key];

  if (rule && rule.linkedTo) {
    // Avleia vekt frГҘ ei anna Гёving
    const [linkedName, linkedDay] = rule.linkedTo.split('_');
    const linkedEx = Object.values(PROGRAM).flatMap(d => d.exercises).find(e => e.name === linkedName);
    const linkedLast = getLastKg(linkedName);
    let base;
    if (linkedLast !== null) {
      // Legg til increment pГҘ den Гёvinga fyrst, sГҘ gang med factor
      const linkedRule = PROGRESSION[rule.linkedTo];
      base = (linkedLast + (linkedRule?.increment || 0)) * rule.factor;
    } else {
      base = (linkedEx?.startKg || 0) * rule.factor;
    }
    return round(base);
  }

  const last = getLastKg(ex.name);
  if (last !== null) {
    return round(last + (rule?.increment || 0));
  }

  // Ingen logg вҖ“ bruk startKg
  if (ex.startKg !== null && ex.startKg !== undefined) return ex.startKg;
  return null;
}

function renderExercises() {
  const prog = PROGRAM[currentDay];
  document.getElementById('dayLabel').textContent = prog.label;
  const list = document.getElementById('exerciseList');
  list.innerHTML = prog.exercises.map((ex, i) => {
    const suggested = ex.hasKg ? getSuggestedKg(ex, currentDay) : null;
    const kgBadge = suggested !== null
      ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-left:8px">вҶ’ ${suggested} kg</span>`
      : (ex.hasKg ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:8px">вҖ”</span>` : '');
    return `
    <div class="exercise-row">
      <div class="ex-num">${i+1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}${kgBadge}</div>
        <div class="ex-target">${ex.target} <span style="color:var(--muted)">В· pause ${ex.pause}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${ex.note}</div>
      </div>
      <button class="ex-done ${checkedExercises[i] ? 'checked' : ''}" onclick="toggleCheck(${i})">
        ${checkedExercises[i] ? 'вң“' : ''}
      </button>
    </div>`;
  }).join('');
}

function toggleCheck(i) {
  checkedExercises[i] = !checkedExercises[i];
  renderExercises();
}

function closeModal(e) {

function saveSession() {
  const date = document.getElementById('logDate').value || new Date().toLocaleDateString('no-NO');
  const weekNum = getCurrentWeek();

  if (currentDay === 'K') {
    const type = document.getElementById('kondisType').value;
    const tid = document.getElementById('kondisTid').value;
    const note = document.getElementById('logNote').value;
    sessions.unshift({ date, day: 'K', kondisType: type, kondisTid: tid, note, week: weekNum });
    save();
    document.getElementById('logModal').classList.remove('open');
    updateWeekBadge();
    const btn = document.getElementById('logBtn');
    btn.textContent = 'вң“ Lagra!';
    setTimeout(() => { btn.textContent = '+ Logg kondisГёkt'; }, 2000);
    return;
  }

  const prog = PROGRAM[currentDay];
  const note = document.getElementById('logNote').value;
  const exercises = prog.exercises.map((ex, ei) => {
    const sets = [];
    for (let s = 1; s <= ex.sets; s++) {
      if (ex.hasKg) {
        const kg = document.getElementById(`ex${ei}_s${s}_kg`)?.value;
        const reps = document.getElementById(`ex${ei}_s${s}_reps`)?.value;
        if (kg || reps) sets.push({ kg: kg || 'вҖ“', reps: reps || 'вҖ“' });
      } else {
        const reps = document.getElementById(`ex${ei}_s${s}_reps`)?.value;
        if (reps) sets.push({ reps });
      }
    }
    return { name: ex.name, hasKg: ex.hasKg, sets };
  }).filter(e => e.sets.length > 0);

  if (!exercises.length) { alert('Fyll inn minst eitt sett!'); return; }

  sessions.unshift({ date, day: currentDay, exercises, note, week: weekNum });
  save();
  document.getElementById('logModal').classList.remove('open');
  checkedExercises = {};
  renderExercises();
  updateWeekBadge();

  const btn = document.querySelector('#view-today .save-btn');
  btn.textContent = 'вң“ Lagra!';
  btn.style.background = 'var(--success)';
  setTimeout(() => { btn.textContent = '+ Logg denne Гёkta'; btn.style.background = 'var(--accent)'; }, 2000);
}

function renderProgress() {
  document.getElementById('statSessions').textContent = sessions.length;
  document.getElementById('statWeek').textContent = getCurrentWeek();

  // PRs: find max weight for main lifts
  const lifts = ['Squat', 'Deadlift', 'Benkpress'];
  const prs = {};
  sessions.forEach(s => s.exercises.forEach(ex => {
    const match = lifts.find(l => ex.name.toLowerCase().startsWith(l.toLowerCase()));
    if (!match) return;
    ex.sets.forEach(set => {
      const kg = parseFloat(set.kg || set);
      if (!isNaN(kg) && (!prs[match] || kg > prs[match])) prs[match] = kg;
    });
  }));

  const prList = document.getElementById('prList');
  if (!Object.keys(prs).length) {
    prList.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">Logg nokre Гёkter for ГҘ sjГҘ personlege rekordar.</div>';
  } else {
    prList.innerHTML = lifts.map(l => `
      <div class="pr-row">
        <span class="pr-name">${l}</span>
        <span class="pr-val">${prs[l] ? prs[l] + ' kg' : 'вҖ“'}</span>
      </div>
    `).join('');
  }

  // Chin-up plan
  const week = getCurrentWeek();
  const chinDiv = document.getElementById('chinupPlan');
  chinDiv.innerHTML = CHINUP_PLAN.map(row => `
    <div class="pr-row" style="${row.veke === week ? 'background:rgba(200,240,96,0.06);border-radius:8px;padding:8px;' : ''}">

function getCurrentWeek() {
  if (!sessions.length) return 1;
  return sessions[0].week || 1;
}

function updateWeekBadge() {
  document.getElementById('weekBadge').textContent = `Veke ${getCurrentWeek()}`;
}

// Week input in progress view (simple prompt)
function bumpWeek() {
  const w = parseInt(prompt('Kva veke er du pГҘ?'));
  if (w && w >= 1 && w <= 12) {
    if (sessions.length) sessions[0].week = w;
    save();
    updateWeekBadge();
    renderProgress();
  }
}

function exportJSON() {
  const data = JSON.stringify(sessions, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `treningslogg_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('Ugyldig format');
      // Merge: legg til Гёkter som ikkje allereie finst (basert pГҘ dato+dag)
      const existing = new Set(sessions.map(s => `${s.date}_${s.day}`));
      const newSessions = imported.filter(s => !existing.has(`${s.date}_${s.day}`));
      sessions = [...sessions, ...newSessions].sort((a, b) => {
        // Sort by date descending (norwegian format DD.MM.YYYY)
        const parse = d => { const p = d.split('.'); return new Date(`${p[2]}-${p[1]}-${p[0]}`); };
        return parse(b.date) - parse(a.date);
      });
      save();
      renderExercises();
      const fb = document.getElementById('importFeedback');
      fb.textContent = `вң“ Importert ${newSessions.length} nye Гёkter!`;
      fb.style.display = 'block';
      setTimeout(() => fb.style.display = 'none', 4000);
    } catch(err) {
      alert('Feil ved import: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// в”Җв”Җ EKSPORT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function copyLog() {
  if (!sessions.length) {
    alert('Ingen Гёkter ГҘ eksportere enno.');
    return;
  }

  const lines = ['TRENINGSLOGG вҖ“ eksport', '='.repeat(30), ''];

  // Group by week
  const byWeek = {};
  sessions.forEach(s => {
    const w = s.week || '?';
    if (!byWeek[w]) byWeek[w] = [];
    byWeek[w].push(s);
  });

  Object.keys(byWeek).sort((a,b) => Number(a)-Number(b)).forEach(w => {
    lines.push(`VEKE ${w}`);
    lines.push('-'.repeat(20));
    byWeek[w].slice().reverse().forEach(s => {
      lines.push(`${s.date}  Dag ${s.day}`);
      s.exercises.forEach(ex => {
        const setsStr = ex.sets.map(set =>
          ex.hasKg ? `${set.kg}kgГ—${set.reps}` : `${set.reps}reps`
        ).join('  ');
        lines.push(`  ${ex.name}: ${setsStr}`);
      });
      if (s.note) lines.push(`  вҶ’ ${s.note}`);
      lines.push('');
    });
  });

  // PRs
  const lifts = ['Squat', 'Deadlift', 'Benkpress'];
  const prs = {};
  sessions.forEach(s => s.exercises.forEach(ex => {
    const match = lifts.find(l => ex.name.toLowerCase().startsWith(l.toLowerCase()));
    if (!match) return;
    ex.sets.forEach(set => {
      const kg = parseFloat(set.kg || set);
      if (!isNaN(kg) && (!prs[match] || kg > prs[match])) prs[match] = kg;
    });
  }));
  if (Object.keys(prs).length) {
    lines.push('='.repeat(30));
    lines.push('PERSONLEGE REKORDAR');
    lifts.forEach(l => { if (prs[l]) lines.push(`  ${l}: ${prs[l]} kg`); });
  }

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const fb = document.getElementById('copyFeedback');
    fb.style.display = 'block';
    setTimeout(() => fb.style.display = 'none', 3000);
  }).catch(() => {
    // Fallback: show in a textarea for manual copy
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;height:60vh;z-index:9999;background:#1a1a24;color:#f0f0f5;font-family:monospace;font-size:12px;padding:12px;border-radius:12px;border:1px solid #2a2a3a;';
    document.body.appendChild(ta);
    ta.select();
    const close = document.createElement('button');
    close.textContent = 'вң• Lukk';
    close.style.cssText = 'position:fixed;top:calc(20px + 60vh + 8px);left:20px;right:20px;z-index:9999;padding:12px;background:var(--accent2);border:none;border-radius:10px;font-family:Syne,sans-serif;font-weight:700;font-size:14px;color:#fff;cursor:pointer;';
    close.onclick = () => { document.body.removeChild(ta); document.body.removeChild(close); };
    document.body.appendChild(close);
  });
}
